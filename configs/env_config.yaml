# AI2-THOR 环境配置

name: "ai2thor"
platform: "wsl"

# AI2-THOR参数
ai2thor:
  grid_size: 0.25
  rotate_step: 30
  camera_width: 300
  camera_height: 300
  visibility_distance: 1.5

# 场景配置
scenes:
  train:
    kitchen:   ["FloorPlan1", "FloorPlan2", "FloorPlan3", "FloorPlan4", "FloorPlan5"]
    living:    ["FloorPlan201", "FloorPlan202", "FloorPlan203", "FloorPlan204", "FloorPlan205"]
    bedroom:   ["FloorPlan301", "FloorPlan302", "FloorPlan303", "FloorPlan304", "FloorPlan305"]

  test_seen:
    - 与train相同

  test_unseen:
    kitchen:   ["FloorPlan6", "FloorPlan7", "FloorPlan8", "FloorPlan9", "FloorPlan10"]
    living:    ["FloorPlan206", "FloorPlan207", "FloorPlan208", "FloorPlan209", "FloorPlan210"]
    bedroom:   ["FloorPlan306", "FloorPlan307", "FloorPlan308", "FloorPlan309", "FloorPlan310"]

# 任务配置
tasks:
  - name: "object_nav"
    weight: 0.7
    max_steps: 50
    target_objects:
      - Microwave
      - Fridge
      - TV
      - Laptop
      - Sofa
      - Chair
      - Bed
      - Sink
      - Toilet
      - Lamp

  - name: "pickup"
    weight: 0.3
    max_steps: 5
    requires_nav: true

# 奖励配置
rewards:
  success_nav: 10.0          # 到达目标位置
  success_pickup: 5.0        # 成功拾取物体
  step_penalty: -0.1         # 每步惩罚
  illegal_action: -1.0       # 非法动作(碰撞/越界)
  # 注: 移除了 closer_bonus 和 farther_penalty
  # 因为基于绝对距离的奖励属于信息泄露(cheating)

# Episode配置
episode:
  max_steps: 100
  success_distance: 1.5
